  - 'region "Scrollytelling: Forschungsprozess" [ref=e6]':
    - generic [ref=e7]:
      - generic [ref=e8]:
        - generic [ref=e9]:
          - generic [ref=e10]: 01 / 10
          - 'heading "Hand aufs Herz: Wie viel von dem, was du über Cannabis weißt, stimmt eigentlich?" [level=2] [ref=e11]':
            - generic [ref=e12]: "Hand aufs Herz:"
            - text: Wie viel von dem, was du über Cannabis weißt, stimmt eigentlich?
          - paragraph [ref=e13]: Im April 2024 wurde Cannabis in Deutschland teil-legalisiert. Mit dem Konsumcannabisgesetz endete eine jahrzehntelange Verbotskultur. Plötzlich stehen Fragen im Raum, die zuvor selten öffentlich gestellt wurden — und alle haben Meinungen dazu.
          - paragraph [ref=e14]: "Das Institut für interdisziplinäre Sucht- und Drogenforschung Hamburg (ISD) wollte es genau wissen: Was glaubt die Bevölkerung tatsächlich über diese Substanz — und wie viel davon stimmt?"
        - generic [ref=e15]:
          - generic [ref=e16]: 02 / 10
          - heading "Jede:r in Deutschland hat eine Meinung über Cannabis." [level=2] [ref=e17]:
            - generic [ref=e18]: Jede:r in Deutschland
            - text: hat eine Meinung über Cannabis.
          - paragraph [ref=e19]: "Online, am Küchentisch, im Wartezimmer. Das ISD sammelte Aussagen systematisch: aus einer Online-Befragung von 1.041 Personen, aus Gesprächen mit 60 Präventionsfachkräften und aus einer Analyse einschlägiger (Online-)Medien."
          - paragraph [ref=e20]: Was Menschen so sagen — manches plausibel, manches widersprüchlich. Was davon stimmt eigentlich? Genau das wollten wir wissen.
          - paragraph [ref=e21]: Tippe auf eine Stimme, um sie zu lesen. ↓
        - generic [ref=e22]:
          - generic [ref=e23]: 03 / 10
          - heading "Aus tausenden Stimmen blieben 42 prüfbare Thesen." [level=2] [ref=e24]:
            - generic [ref=e25]: Aus tausenden Stimmen
            - text: blieben 42 prüfbare Thesen.
          - paragraph [ref=e26]: "Drei empirische Quellen — eine Online-Befragung von 1.041 Personen, Gespräche mit 60 Präventionsfachkräften und eine systematische Medienanalyse — wurden gegeneinander abgeglichen. Aussagen, die in mehreren Quellen auftauchten, wurden gebündelt und in prüfbare Thesen verdichtet. Anschließend thematisch sortiert: medizinisch, körperlich, psychisch, kombiniert, sozial, rechtlich."
          - paragraph [ref=e27]: "Das Ergebnis: 42 Thesen — manche stimmen, manche nicht."
        - generic [ref=e28]:
          - generic [ref=e29]: 04 / 10
          - heading "Jede These wurde gegen die Forschungsliteratur geprüft." [level=2] [ref=e30]:
            - generic [ref=e31]: Jede These wurde
            - text: gegen die Forschungsliteratur geprüft.
          - paragraph [ref=e32]: "In einer systematischen Literaturrecherche wurde jede der 42 Thesen gegen die aktuelle wissenschaftliche Evidenz geprüft — auf einer vierstufigen Skala: richtig, eher richtig, eher falsch, falsch."
          - paragraph [ref=e33]: ↑ 16 stimmen. ↗ 6 stimmen eher. ↙ 11 stimmen eher nicht. ↓ 7 stimmen nicht. — Bei 2 Thesen lässt die Forschungslage keine eindeutige Aussage zu.
          - paragraph [ref=e34]: "Grundlage: 548 wissenschaftliche Quellen, ausgewertet in PubMed, PsychInfo, SocIndex und Google Scholar (Stand: September 2025)."
          - paragraph [ref=e35]: Tippe auf eine Karte, um sie zu lesen. ↓
        - generic [ref=e36]:
          - generic [ref=e37]: 05 / 10
          - heading "Dann fragten wir 2.795 Menschen, was sie für richtig halten." [level=2] [ref=e38]:
            - generic [ref=e39]: Dann fragten wir 2.795 Menschen,
            - text: was sie für richtig halten.
          - paragraph [ref=e40]: Eine Bevölkerungsbefragung in Deutschland mit 2.097 Erwachsenen (18–70 Jahre), 555 Minderjährigen (16–17 Jahre) und 143 Mitgliedern von Cannabis-Anbauvereinigungen.
          - paragraph [ref=e41]: "Für jede der 42 Thesen wurden fünf Indikatoren erhoben — über fünf Zielgruppen hinweg: Volljährige, Minderjährige, Konsumierende, junge Erwachsene und Eltern minderjähriger Kinder."
        - generic [ref=e42]:
          - generic [ref=e43]: 06 / 10
          - heading "Fünf Fragen. Fünf Indikatoren." [level=2] [ref=e44]:
            - generic [ref=e45]: Fünf Fragen.
            - text: Fünf Indikatoren.
          - paragraph [ref=e48]:
            - text: Wer kennt was? Kenntnis misst, wie viele Menschen eine Aussage überhaupt schon gehört haben. Beispiel „Cannabis lindert Schmerzen“
            - generic [ref=e49]: ↙ eher falsch
            - text: — 77 % der Konsumierenden haben die Aussage schon gehört, aber nur 12 % der Erwachsenen kennen „Cannabis ist ein Allheilmittel“
            - generic [ref=e50]: ↓ falsch
            - text: ; der Mythos ist wenig verbreitet.
          - paragraph [ref=e53]: Was ist Menschen wichtig? Bedeutung erfasst, wie wichtig eine Aussage für den eigenen Umgang mit Cannabis ist. Wer eine Aussage kennt, gibt ihr meist auch Bedeutung — die beiden Werte hängen eng zusammen.
          - paragraph [ref=e56]:
            - text: Wer beurteilt richtig? Richtigkeit vergleicht die Einschätzung der Befragten mit der wissenschaftlichen Klassifikation. Bei „Verkehrssicherheit“
            - generic [ref=e57]: ↑ richtig
            - text: erreichen Erwachsene 92 von 100 Punkten — nahezu Konsens. Bei „Motivationsverlust durch Cannabis“
            - generic [ref=e58]: ↓ falsch
            - text: nur 25 Punkte — die Mehrheit liegt falsch.
          - paragraph [ref=e61]:
            - text: "Welche Mythen brauchen Aufklärung? Präventionsbedeutung kombiniert die Bedeutung einer Aussage mit ihrer Wissenslücke. Drei ragen heraus: „Cannabis lindert Schmerzen“"
            - generic [ref=e62]: ↙ eher falsch
            - text: (34 Punkte), „Cannabis ist eine Einstiegsdroge“
            - generic [ref=e63]: ↙ eher falsch
            - text: (28 Punkte) — und für Minderjährige „Das Gesetz wird den Konsum erhöhen“
            - generic [ref=e64]: ↙ eher falsch
            - text: (23 Punkte).
          - paragraph [ref=e67]: Wie groß ist der Hebel? Bevölkerungsrisiko skaliert die Präventionsbedeutung mit dem Bekanntheitsgrad. So lässt sich abschätzen, wo Aufklärung am meisten Menschen erreicht.
        - generic [ref=e68]:
          - generic [ref=e69]: 07 / 10
          - heading "Wo wir suchen. Wem wir vertrauen." [level=2] [ref=e70]:
            - generic [ref=e71]: Wo wir suchen.
            - text: Wem wir vertrauen.
          - paragraph [ref=e72]: Arztpraxen und Apotheken genießen mit 92 Vertrauenspunkten die höchste Glaubwürdigkeit als Gesundheitsinformations-Quelle — in allen Zielgruppen. Aber nur 37% der Minderjährigen suchen dort tatsächlich Informationen. Bei den Erwachsenen sind es 60%. Minderjährige fragen stattdessen Angehörige (53%) — die zwar ähnlich vertraut sind, aber selbst oft schlecht informiert.
          - paragraph [ref=e73]: Die Lücke zwischen Vertrauen und Nutzung ist der eigentliche Befund.
          - paragraph [ref=e74]: Wechsle die Zielgruppe oben. Bewege die Maus über eine Quelle, um sie in beiden Streifen zu sehen. ↓
        - generic [ref=e75]:
          - generic [ref=e76]: 08 / 10
          - heading "Was uns nebenbei erreicht. Wo Aufklärung am meisten bewegt." [level=2] [ref=e77]:
            - generic [ref=e78]: Was uns nebenbei erreicht.
            - text: Wo Aufklärung am meisten bewegt.
          - paragraph [ref=e79]: Nicht aktiv gesuchten Gesundheitsinformationen begegnen wir in Radio, Fernsehen und Plakaten. Vertrauen wir ihnen weniger? Ja — aber sie erreichen uns trotzdem.
          - paragraph [ref=e80]: Multipliziert man, wie oft eine Quelle genutzt wird, mit dem Vertrauen in sie, ergibt sich ihr Präventionspotenzial. Die größten Hebel liegen nicht dort, wo Information am häufigsten landet — sondern dort, wo beides zusammenkommt.
        - generic [ref=e81]:
          - generic [ref=e82]: 09 / 10
          - heading "Was wir daraus gemacht haben." [level=2] [ref=e83]
          - paragraph [ref=e84]: "Diese Website verwertet die Befunde der CaRM-Studie für unterschiedliche Bedürfnisse:"
          - paragraph [ref=e85]: — 42 Faktenkarten mit wissenschaftlicher Klassifikation, Quellen und Erklärungen je Mythos. — Ein Quiz, das dein eigenes Wissen mit den Ergebnissen der Bevölkerungsbefragung vergleicht. — Den Daten-Explorer mit Sichten für allgemeines Publikum, Eltern, Fachkräfte und Forschung. — Meine Interessen — die FAQ, sortiert nach Themen und Zielgruppen.
        - generic [ref=e86]:
          - generic [ref=e87]: 10 / 10
          - heading "Wer hinter der Studie steht." [level=2] [ref=e88]
          - paragraph [ref=e89]: "Die CaRM-Studie — Cannabiskonsum: Risiken und Mythen. Durchgeführt vom Institut für interdisziplinäre Sucht- und Drogenforschung (ISD) in Hamburg. Gefördert vom Bundesinstitut für Öffentliche Gesundheit (BIÖG)."
