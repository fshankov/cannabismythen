  - 'region "Scrollytelling: Forschungsprozess" [ref=e6]':
    - generic [ref=e7]:
      - generic [ref=e8]:
        - generic [ref=e9]:
          - generic [ref=e10]: 01 / 10
          - 'heading "Hand aufs Herz: Wie viel von dem, was du über Cannabis weißt, stimmt eigentlich?" [level=2] [ref=e11]':
            - generic [ref=e12]: "Hand aufs Herz:"
            - text: Wie viel von dem, was du über Cannabis weißt, stimmt eigentlich?
          - paragraph [ref=e13]: Im April 2024 wurde Cannabis in Deutschland teil-legalisiert. Das Konsumcannabisgesetz beendete eine jahrzehntelange Verbotskultur. Auf einmal stehen Fragen im Raum, die vorher selten gestellt wurden — und alle haben eine Meinung dazu.
          - paragraph [ref=e14]: "Das Institut für interdisziplinäre Sucht- und Drogenforschung Hamburg (ISD) wollte es genau wissen: Was glaubt die Bevölkerung wirklich über Cannabis — und wie viel davon stimmt?"
        - generic [ref=e15]:
          - generic [ref=e16]: 02 / 10
          - heading "Jede:r in Deutschland hat eine Meinung über Cannabis." [level=2] [ref=e17]:
            - generic [ref=e18]: Jede:r in Deutschland
            - text: hat eine Meinung über Cannabis.
          - paragraph [ref=e19]: "Online, am Küchentisch, im Wartezimmer — Cannabis ist ein Thema. Das ISD sammelte Aussagen systematisch: eine Online-Befragung von 1.041 Personen, Gespräche mit 60 Präventionsfachkräften, eine Analyse einschlägiger (Online-)Medien."
          - paragraph [ref=e20]: Manches klingt plausibel, manches widersprüchlich. Was davon stimmt eigentlich? Genau das wollten wir herausfinden.
          - paragraph [ref=e21]: Tippe auf eine Stimme, um sie zu lesen. ↓
        - generic [ref=e22]:
          - generic [ref=e23]: 03 / 10
          - heading "Aus tausenden Stimmen blieben 42 prüfbare Thesen." [level=2] [ref=e24]:
            - generic [ref=e25]: Aus tausenden Stimmen
            - text: blieben 42 prüfbare Thesen.
          - paragraph [ref=e26]: "Drei Quellen, gegeneinander abgeglichen: Online-Befragung, Fachgespräche, Medienanalyse. Aussagen, die immer wieder auftauchten, wurden gebündelt und zu prüfbaren Thesen verdichtet. Dann thematisch sortiert: medizinisch, körperlich, psychisch, kombiniert, sozial, rechtlich."
          - paragraph [ref=e27]: 42 Thesen blieben übrig. Manche stimmen, manche nicht.
        - generic [ref=e28]:
          - generic [ref=e29]: 04 / 10
          - heading "Jede These wurde gegen die Forschungsliteratur geprüft." [level=2] [ref=e30]:
            - generic [ref=e31]: Jede These wurde
            - text: gegen die Forschungsliteratur geprüft.
          - paragraph [ref=e32]: "Jede der 42 Thesen geprüft — gegen die aktuelle wissenschaftliche Evidenz. Vierstufige Skala: richtig, eher richtig, eher falsch, falsch."
          - paragraph [ref=e33]: ↑ 16 stimmen. ↗ 6 stimmen eher. ↙ 11 stimmen eher nicht. ↓ 7 stimmen nicht. — Bei 2 Thesen lässt die Forschungslage keine eindeutige Aussage zu.
          - paragraph [ref=e34]: "Grundlage: 548 wissenschaftliche Quellen aus PubMed, PsychInfo, SocIndex und Google Scholar (Stand: September 2025)."
          - paragraph [ref=e35]: Tippe auf eine Karte, um sie zu lesen. ↓
        - generic [ref=e36]:
          - generic [ref=e37]: 05 / 10
          - heading "Dann fragten wir 2.795 Menschen, was sie für richtig halten." [level=2] [ref=e38]:
            - generic [ref=e39]: Dann fragten wir 2.795 Menschen,
            - text: was sie für richtig halten.
          - paragraph [ref=e40]: "Bevölkerungsbefragung in Deutschland: 2.097 Erwachsene (18–70 Jahre), 555 Minderjährige (16–17 Jahre), 143 Mitglieder von Cannabis-Anbauvereinigungen."
          - paragraph [ref=e41]: "Für jede der 42 Thesen erhoben wir fünf Indikatoren — über fünf Zielgruppen hinweg: Volljährige, Minderjährige, Konsumierende, junge Erwachsene und Eltern minderjähriger Kinder."
        - generic [ref=e42]:
          - generic [ref=e43]: 06 / 10
          - heading "Was sie wissen. Was sie glauben." [level=2] [ref=e44]:
            - generic [ref=e45]: Was sie wissen.
            - text: Was sie glauben.
          - paragraph [ref=e48]:
            - strong [ref=e49]: Kenntnis
            - text: misst, wer eine Aussage überhaupt schon gehört hat. 77 % der Konsumierenden kennen „Cannabis lindert Schmerzen“
            - generic [ref=e50]: ↙ eher falsch
            - text: . Nur 12 % der Erwachsenen kennen „Cannabis ist ein Allheilmittel“
            - generic [ref=e51]: ↓ falsch
            - text: — der Mythos ist wenig verbreitet.
          - paragraph [ref=e54]:
            - strong [ref=e55]: Bedeutung
            - text: misst, wie stark eine Aussage den eigenen Umgang mit Cannabis prägt. Was Menschen kennen, wiegt für sie meist auch schwerer — beide Werte laufen eng zusammen.
          - paragraph [ref=e58]:
            - strong [ref=e59]: Richtigkeit
            - text: vergleicht die Einschätzung der Befragten mit der wissenschaftlichen Klassifikation. „Cannabis gefährdet die Verkehrssicherheit“
            - generic [ref=e60]: ↑ richtig
            - text: kommt bei Erwachsenen auf 92 von 100 — fast Konsens. „Cannabis verursacht Motivationsverlust“
            - generic [ref=e61]: ↓ falsch
            - text: erreicht nur 25 — die Mehrheit liegt daneben.
          - paragraph [ref=e64]:
            - strong [ref=e65]: Präventionsbedeutung
            - text: kreuzt Bedeutung mit Wissenslücke. Sie zeigt, wo ein falsches Bild Verhalten prägt — und wo Aufklärung am meisten Wirkung zeigt.
          - paragraph [ref=e68]:
            - strong [ref=e69]: Bevölkerungsrisiko
            - text: skaliert die Präventionsbedeutung mit der Bekanntheit eines Mythos. Ein verbreiteter Halbmythos erreicht mehr Köpfe als ein obskurer. Nur sinnvoll für Voll- und Minderjährige.
        - generic [ref=e70]:
          - generic [ref=e71]: 07 / 10
          - heading "Wo wir suchen. Wem wir vertrauen." [level=2] [ref=e72]:
            - generic [ref=e73]: Wo wir suchen.
            - text: Wem wir vertrauen.
          - paragraph [ref=e75]: Wo suchen Menschen tatsächlich nach Gesundheitsinformationen? Apotheken und Arztpraxen führen bei Erwachsenen (60 %). Minderjährige greifen dort nur zu 37 % zu — sie fragen lieber Angehörige (53 %). Foren und Influencer:innen sind vor allem für jüngere Gruppen relevant.
          - paragraph [ref=e77]: Und wem vertrauen sie dabei? Apotheken erreichen 92 Vertrauenspunkte, in allen Zielgruppen. Doch wer dort vertraut, sucht nicht zwangsläufig dort. Die Lücke zwischen Vertrauen und Nutzung ist der eigentliche Befund.
          - paragraph [ref=e78]: Wechsle die Zielgruppe oben. Bewege die Maus über eine Quelle, um sie in beiden Streifen zu sehen. ↓
        - generic [ref=e79]:
          - generic [ref=e80]: 08 / 10
          - heading "Was uns nebenbei erreicht. Wo Aufklärung am meisten bewegt." [level=2] [ref=e81]:
            - generic [ref=e82]: Was uns nebenbei erreicht.
            - text: Wo Aufklärung am meisten bewegt.
          - paragraph [ref=e84]: Nicht aktiv gesuchten Gesundheitsinformationen begegnen wir in Radio, Fernsehen, auf Plakaten und Infoscreens. Vertrauen wir ihnen weniger? Ja — und sie erreichen uns trotzdem.
          - paragraph [ref=e86]: Wie oft eine Quelle genutzt wird, mal das Vertrauen in sie — das ergibt ihr Präventionspotenzial. Die größten Hebel liegen nicht dort, wo Information am häufigsten landet, sondern dort, wo Reichweite und Vertrauen zusammenfallen.
        - generic [ref=e87]:
          - generic [ref=e88]: 09 / 10
          - heading "Was wir daraus gemacht haben." [level=2] [ref=e89]
          - paragraph [ref=e90]: "Diese Website verwertet die Befunde der CaRM-Studie für unterschiedliche Bedürfnisse:"
          - paragraph [ref=e91]: — 42 Faktenkarten mit wissenschaftlicher Klassifikation, Quellen und Erklärungen je Mythos. — Ein Quiz, das dein eigenes Wissen mit den Ergebnissen der Bevölkerungsbefragung vergleicht. — Den Daten-Explorer mit Sichten für allgemeines Publikum, Eltern, Fachkräfte und Forschung. — Meine Interessen — die FAQ, sortiert nach Themen und Zielgruppen.
        - generic [ref=e92]:
          - generic [ref=e93]: 10 / 10
          - heading "Wer hinter der Studie steht." [level=2] [ref=e94]
          - paragraph [ref=e95]: "Die CaRM-Studie — Cannabiskonsum: Risiken und Mythen. Durchgeführt vom Institut für interdisziplinäre Sucht- und Drogenforschung (ISD) in Hamburg. Gefördert vom Bundesinstitut für Öffentliche Gesundheit (BIÖG)."
