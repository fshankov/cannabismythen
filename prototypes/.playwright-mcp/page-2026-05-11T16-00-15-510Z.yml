          - heading "Wer hinter der Studie steht." [level=2] [ref=e97]
          - paragraph [ref=e98]: "Die CaRM-Studie — Cannabiskonsum: Risiken und Mythen. Durchgeführt vom Institut für interdisziplinäre Sucht- und Drogenforschung (ISD) in Hamburg. Gefördert vom Bundesinstitut für Öffentliche Gesundheit (BIÖG)."
