  status = 301
  force = true

[[redirects]]
  from = "/ueber-uns/projekt/*"
  to = "/projekt/"
  status = 301
  force = true

[[redirects]]
  from = "/ueber-uns/methodik"
  to = "/projekt/"
  status = 301
  force = true

[[redirects]]
  from = "/ueber-uns/methodik/*"
  to = "/projekt/"
  status = 301
  force = true

[[redirects]]
  from = "/ueber-uns/team"
  to = "/projekt/"
  status = 301
  force = true

[[redirects]]
  from = "/ueber-uns/team/*"
  to = "/projekt/"
  status = 301
  force = true

[[redirects]]
  from = "/ueber-uns/klassifikation"
  to = "/projekt/"
  status = 301
  force = true

[[redirects]]
  from = "/ueber-uns/klassifikation/*"
  to = "/projekt/"
  status = 301
  force = true

[[redirects]]
  from = "/ueber-uns"
  to = "/projekt/"
  status = 301
  force = true

[[redirects]]
