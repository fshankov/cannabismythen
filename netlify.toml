[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "SITE_PASSWORD,KEYSTATIC_GITHUB_CLIENT_ID,KEYSTATIC_GITHUB_CLIENT_SECRET,KEYSTATIC_SECRET"

# ---------------------------------------------------------------------------
# Tracker artifact (BugHerd feedback tracker) lives at
# public/tracker/index.html and is served at /tracker/. With
# edgeMiddleware: true, Astro's SSR function handles directory URLs and
# returns 404 because there's no /tracker route in src/pages. These two
# rules rewrite both /tracker and /tracker/ to the concrete file so the
# static asset is served. SITE_PASSWORD gate still applies via middleware.
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/tracker"
  to = "/tracker/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/tracker/"
  to = "/tracker/index.html"
  status = 200
  force = true

# Catch-all: any other file under /tracker/ (e.g. embedded comparison
# table at /tracker/feedback-tools-comparison-v2.html) should serve as
# a static asset, not be intercepted by the SSR function. The :splat
# resolves to whatever path the user requested under /tracker/.
[[redirects]]
  from = "/tracker/*"
  to = "/tracker/:splat"
  status = 200
  force = true

# ---------------------------------------------------------------------------
# Stage 5 of the Daten-Explorer refactor — `/zahlen-und-fakten/*` renamed
# to `/daten-explorer/*`. Belt-and-braces with the edge middleware in
# `src/middleware.ts`: middleware handles the request flow, these rules
# cover any path that bypasses it (static asset prefetch, CDN edge cache).
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/zahlen-und-fakten"
  to = "/daten-explorer/"
  status = 301
  force = true

[[redirects]]
  from = "/zahlen-und-fakten/daten/*"
  to = "/daten-explorer/"
  status = 301
  force = true

# The /daten-explorer/daten/{slug} indicator pages were removed (2026-06-25
# cleanup); collapse any leftover/bookmarked links to the explorer index.
[[redirects]]
  from = "/daten-explorer/daten/*"
  to = "/daten-explorer/"
  status = 301
  force = true

[[redirects]]
  from = "/zahlen-und-fakten/*"
  to = "/daten-explorer/:splat"
  status = 301
  force = true

# ---------------------------------------------------------------------------
# Travel pipeline Stage 5 (2026-05-23) — individual myth pages retired;
# popup inside /daten-explorer/ is the canonical surface for myth content.
# Edge middleware (src/middleware.ts) handles the redirect at the edge,
# extracting the numeric mythId from the slug so /daten-explorer/?mythos={N}
# opens the popup directly. We intentionally do NOT add a netlify.toml
# splat rule here — Netlify path-pattern redirects can't extract the
# numeric prefix from a slug like "m01-allheilmittel", and a non-splat
# fallback would beat the more useful middleware redirect in dev mode.
# In production the edge function always wins (it runs before redirect
# rules), so this is safe.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Session 3a of 2026-05 — `/haeufige-fragen/*` renamed to
# `/meine-interessen/*` per BugHerd #6 (Fedor 2026-05-07). Mirror rules
# also live in `src/middleware.ts`.
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/haeufige-fragen"
  to = "/meine-interessen/"
  status = 301
  force = true

[[redirects]]
  from = "/haeufige-fragen/frage/*"
  to = "/meine-interessen/frage/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/haeufige-fragen/*"
  to = "/meine-interessen/:splat"
  status = 301
  force = true

# ---------------------------------------------------------------------------
# 2026-05-14 — `/ueber-uns/` renamed to `/projekt/` so the URL matches the
# nav label "Über das Projekt". Also collapses the 4 legacy sub-paths
# (projekt, methodik, team, klassifikation) from the 2026-05-11
# scrollytelling consolidation. Mirror rules also live in
# `src/middleware.ts`. Order matters: the more specific sub-path rules
# come BEFORE the catch-all so they don't accidentally pass through.
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/ueber-uns/projekt"
