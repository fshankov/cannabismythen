    Schütze, C., Schulte, B., Buth, S., Degkwitz, P., Rosenkranz, M., & Lahusen, H. (2026). Cannabiskonsum — Risiken und Mythen (CaRM): Abschlussbericht. ISD Hamburg.
internalNotes: >-
  Iter-22 (2026-06-01) — Linke-Spalte-Copy + Inline-Icons (Fedor-Review,
  faktengeprüft am CaRM-Abschlussbericht). AI-Entwurf, wartet auf ISD-Abnahme.
  Newton-Stimme: Zahl vor Behauptung, ein Qualifier, kein Drama, du-Form.
  Änderungen: 1/11 weicher ("Seitdem … fast jede:r" statt "Auf einmal … alle").
  2/11 reale Zahl ergänzt: 7.408 frei formulierte Aussagen (Bericht §3.1.4).
  3/11 Überschrift "Tausende Stimmen, verdichtet zu 42 prüfbaren Thesen" +
  Trichter 7.408 → 53 Themenfelder → 42 Thesen. 5/11 Zielgruppen als Icon-
  Liste (Volljährige/Minderjährige/Konsumierende/junge Erwachsene/Eltern).
  6/11 neue Überschrift "Bekannt, bedeutsam — und falsch eingeschätzt." +
  Indikator-Icons + Genauigkeit: "Aktuelle Studien können einen Zusammenhang
  zwischen Cannabis und einem generellen Motivationsverlust nicht bestätigen"
  (Bericht §7.28; Prüfthese 28 = falsch). 7/11 Indikator-Icons, "Doch"-
  Kontrast, "der höchste Wert" → "einer der höchsten Werte" (Bericht: zwei
  Mythen teilen sich die höchste individuelle Präventionsbedeutung). 8/11
  "In einem eigenen Studienteil …" + Lücke zwischen Vertrauen und
  *tatsächlicher Informationssuche* (Bericht §4.5: hohes Vertrauen, aber
  Apotheke wird nicht zwangsläufig aktiv aufgesucht — also "suchen/fragen",
  nicht "kaufen"). 10/11 Angebote als Icon-Liste (Faktenkarten/Quiz/Daten-
  Explorer/Meine Interessen, Icons wie in der Mobile-Navigation). Icons via
  `{icon:KEY}`-Token (ScrollytellingViewer renderBodyWithVerdicts); Step-3
  Kategorie-Icons (CATEGORY_META) in Legende + Matrix, Farben unverändert.
  English gloss of the changed lines is in the Iter-22 plan section.


  Iter-4 production migration (2026-05-11). All German strings AI-drafted from the legacy /ueber-uns/{projekt,methodik,team,klassifikation}.mdoc files. Pending ISD review per Asana task https://app.asana.com/1/1214692075439040/project/1214704634010891/task/1214715500051497. Open numerical questions also tracked there (n=2.795 vs 2.777; Klassifikation counts 16/6/11/7/2 vs 15/5/11/9/2; 39 vs 42 Fact-Sheets; Dr. Rosenkranz title; bio lines).


  Iter-9 (2026-05-14) — Schritte 6, 7, 8 konsolidiert. Schritt 6 wurde von fünf Sub-Phasen auf zwei reduziert: Phase 1 zeigt die drei direkt gemessenen Indikatoren (Kenntnis, Bedeutung, Richtigkeit) gemeinsam, Phase 2 die zwei daraus abgeleiteten (Präventionsbedeutung, Bevölkerungsrisiko) als Synthese-Beat. Schritte 7 und 8 haben statt zwei Phasen je eine zusammengeführte Aussage. Die neuen deutschen Texte sind hier im Keystatic-Editor unter „Über uns Scrollytelling" → Felder steps[5..7].bodyText direkt bearbeitbar — keine Code-Änderung nötig. Zahlen (77 %, 92, 25, 60 %, 37 %, 53 %, 92 von 100) stammen aus dem CaRM-Endbericht; bei Korrekturen bitte hier ändern.


  Iter-10 (2026-05-14) — Synthese als eigener Schritt 7. Die zwei abgeleiteten Indikatoren (Präventionsbedeutung, Bevölkerungsrisiko) leben jetzt in einem eigenen Schritt mit eigener Überschrift, statt als Phase-2 innerhalb Schritt 6. Sources (Suche/Vertrauen, Wahrnehmung/Prävention) wandern zu Schritten 8 + 9, CTA zu Schritt 10, Team zu Schritt 11. Insgesamt 11 Schritte. Bearbeitbar wie zuvor im Keystatic-Editor.


  Iter-12 (2026-05-28) — Schritte 6 + 7 zeigen jetzt einen einzelnen Mythos (M28, Motivationsverlust) als Balken-Stack in der Daten-Explorer-Optik, statt 5 Beispiel-Mythen als Parallel-Coordinates. Schritt 6 enthüllt die 3 gemessenen Indikatoren (Kenntnis, Bedeutung, Richtigkeit) als Balken-Zeilen; Schritt 7 die 2 abgeleiteten (Präventionsbedeutung, Bevölkerungsrisiko). Die deutschen Texte folgen der Lesebeispiel-Vorlage aus dem Daten-Explorer-Tooltip (gleiche Wortwahl wie beim Hover über eine Zelle). Zahlen (26 %, 67, 25, 60, 17) stammen direkt aus public/data/carm-data.json — bitte nicht hier nachredigieren, sondern in der JSON.

  Schritte 8 + 9 zeigen Informationsquellen 2 (Apotheke, Angehörige, Foren, Plakat, Kurzbeitrag TV/Radio) als Spannweite-Grid mit Daten-Explorer-Look. Schritt 8 enthüllt Suche + Vertrauen, Schritt 9 zusätzlich Wahrnehmung + Prävention. Hover-Tooltip pro Zelle liefert den entsprechenden LesebeispielSource-Satz für die aktive Zielgruppe.

  Alle 11 Visualisierungen leben jetzt in einem festen Canvas-Rahmen (.scrolly__viz-canvas, max-width 560 px, aspect-ratio 4 / 5) mit `overflow: hidden` — Grundlage für die spätere Mobile-Anpassung.


  Iter-13 (2026-05-28) — Canvas-Rahmen unsichtbar gemacht (kein Rand, kein Hintergrund, kein Schatten, kein Padding) und auf Querformat umgestellt: max-width 720 px, aspect-ratio 5 / 4, max-height min(72dvh, 560 px). Die Audience-Picker-Pillen passen jetzt vollständig in den sichtbaren Bereich; die Balken-Zeilen und Quellen-Spalten haben mehr horizontalen Raum.


  Iter-14 (2026-05-28, Harald-Review) — Inhaltliche und UX-Korrekturen aus dem ISD-Review:

  • CAR-12/13: Veröffentlichungsdatum von „September 2026 / Diese Website" auf „Dezember 2025 / Abschlussbericht" verschoben (Schritt 1 Timeline-Anker + steps[0].legend + timelineTooltips[5]).  English gloss: publication moved from Sep 2026 to Dec 2025 + subtitle reframed as "Final report" instead of "This website".

  • CAR-14: Verdict-Vokabular im Step-4-Hover umgestellt vom umgangssprachlichen „stimmt / stimmt eher / stimmt eher nicht / stimmt nicht" auf die kanonischen „Richtig / Eher richtig / Eher falsch / Falsch / Keine Aussage". English gloss: switched to the canonical four-level classification used everywhere else on the site.

  • CAR-15/16/17: Vier dezente „Mehr im Daten-Explorer →" Ghost-Buttons unter Schritten 6, 7, 8, 9 — verlinken absolut auf https://cannabismythen.de/daten-explorer/ (Step 6 default · Step 7 ?indicator=praevention · Steps 8 + 9 ?view=quellen2). Englisch: "More in the Daten-Explorer →".

  • CAR-18: Bereits abgedeckt — VizSourcesSpannweite verwendet schon `data.sourceCategories[].name` (deutsche Labels) in Legende + Tooltip; keine englischen Roh-IDs sichtbar.

  • CAR-21: Drei `namedExperts`-Einträge (Dr. Jens Kalke / Dr. Heike Zurhold / Veronika Möller) aus Step 11 gelöscht; UI-Surface in VizTeamRow ebenfalls entfernt. Verlagerung in einen Footer-Credit-Block folgt im separaten Footer-Prompt.

  • CAR-22: Step-11-bodyText auf „Durchgeführt vom Institut für interdisziplinäre Sucht- und Drogenforschung (ISD) in Hamburg. Gefördert vom Bundesinstitut für Öffentliche Gesundheit (BIÖG) im Auftrag des Bundesministeriums für Gesundheit." aktualisiert. ISD- und BIÖG-Logos als anklickbare Bildlinks direkt unter dem Studientitel im Viz-Block — SVGs aus cannabismythen/_local/design/logos/ nach public/logos/ kopiert. English gloss: "Conducted by ISD Hamburg, funded by BIÖG on behalf of the Federal Ministry of Health" + clickable institution logos.

  • Cross-cutting #1: `useFlipPosition` um optionalen `boundsRef` erweitert, der zusätzlich an die Viz-Block-Grenzen klammert. Eingesetzt in VizTimeline, VizMythGrid, VizSingleMythBalken, VizSourcesSpannweite — Tooltips bluten nicht mehr über den Canvas-Rahmen hinaus.

  • Cross-cutting #2: `min-height: 300 px` auf den neuen Vizes für vertikale Sicherheit auf schmalen Viewports (z. B. iPhone 13 Pro 390 × 844).
