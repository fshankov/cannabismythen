pageTitle: Über das Projekt
pageDescription: >-
  Die CaRM-Studie — Cannabiskonsum: Risiken und Mythen. Forschungsprozess,
  Methodik und Team in einer interaktiven Geschichte.
steps:
  - heading: |-
      Hand aufs Herz:
      Wie viel von dem, was du über Cannabis weißt, stimmt eigentlich?
    bodyText: >-
      Im April 2024 wurde Cannabis in Deutschland teil-legalisiert. Das Konsumcannabisgesetz beendete eine jahrzehntelange Verbotskultur. Seitdem stehen Fragen im Raum, die vorher kaum gestellt wurden — und fast jede:r hat eine Meinung dazu.


      Das Institut für interdisziplinäre Sucht- und Drogenforschung Hamburg (ISD) wollte es genau wissen: Was glaubt die Bevölkerung wirklich über Cannabis — und wie viel davon stimmt?
    legend: "★ Projektzeitraum CaRM-Studie · April 2024 bis Dezember 2025"
    hint: ""
  - heading: |-
      Jede:r in Deutschland
      hat eine Meinung über Cannabis.
    bodyText: >-
      Online, am Küchentisch, im Wartezimmer — Cannabis ist ein Thema. Das ISD trug die Aussagen systematisch zusammen: 7.408 frei formulierte Aussagen — aus einer Online-Befragung von 1.041 Personen, Gesprächen mit 60 Präventionsfachkräften und einer Analyse einschlägiger (Online-)Medien.


      Manches klingt plausibel, manches widersprüchlich. Was davon stimmt eigentlich? Genau das wollten wir herausfinden.
    legend: "7.408 Aussagen · 53 Themenfelder · 42 prüfbare Thesen"
    hint: ""
  - heading: |-
      Tausende Stimmen, verdichtet
      zu 42 prüfbaren Thesen.
    bodyText: >-
      Drei Quellen, gegeneinander abgeglichen: Online-Befragung, Fachgespräche, Medienanalyse. Aus 7.408 Aussagen wurden 53 Themenfelder — und daraus **42 prüfbare Thesen**, thematisch geordnet.
    hint: ""
  - heading: |-
      Jede These wurde
      gegen die Forschungsliteratur geprüft.
    bodyText: >-
      Jede der 42 Thesen — abgeglichen mit der aktuellen wissenschaftlichen Evidenz. Vierstufige Skala von **falsch** bis **richtig**, plus „keine Aussage", wenn die Forschungslage uneindeutig bleibt.
    legend: >-
      548 wissenschaftliche Quellen — systematische Literaturrecherche in PubMed, PsychInfo, SocIndex, Google Scholar (Stand 09/2025).
    hint: ""
  - heading: |-
      Dann fragten wir 2.795 Menschen,
      was sie für richtig halten.
    bodyText: |-
      Bevölkerungsbefragung in Deutschland: 2.097 Erwachsene (18–70 Jahre), 555 Minderjährige (16–17 Jahre), 143 Mitglieder von Cannabis-Anbauvereinigungen.

      Für jede der 42 Thesen erhoben wir fünf Indikatoren — über fünf Zielgruppen hinweg:

      {icon:adults} Volljährige
      {icon:minors} Minderjährige
      {icon:consumers} Konsumierende
      {icon:young_adults} junge Erwachsene
      {icon:parents} Eltern minderjähriger Kinder
    hint: ""
  - heading: |-
      Bekannt, bedeutsam —
      und falsch eingeschätzt.
    bodyText: |-
      Beispiel-These: „Cannabiskonsum verursacht einen generellen Motivationsverlust." [↓ falsch]

      {icon:awareness} **Kenntnis.** 26 % der Erwachsenen kennen diesen Mythos — ein niedriger mittlerer Wert.

      {icon:significance} **Bedeutung.** Für die Erwachsenen, die ihn kennen, ist er durchaus wichtig: 67 von 100 Punkten für den eigenen Umgang mit Cannabis.

      {icon:correctness} **Richtigkeit.** Die Einordnung im Sinne der wissenschaftlichen Klassifikation erreicht nur 25 von 100 Punkten — die meisten liegen also daneben. Dabei ist der Befund eindeutig: Aktuelle Studien können einen Zusammenhang zwischen Cannabis und einem generellen Motivationsverlust nicht bestätigen.
    legend: "Stichprobe: 2.097 Volljährige, 18–70 Jahre."
    hint: ""
  - heading: |-
      Wo Aufklärung
      am meisten bewegt.
    bodyText: |-
      Aus diesen drei Werten leiten sich zwei weitere ab.

      {icon:prevention_significance} **Präventionsbedeutung.** Aus individueller Bedeutung und Beurteilung ergibt sich ein mittleres Niveau von 60 Punkten — einer der höchsten Werte unter allen 42 Thesen.

      {icon:population_relevance} **Bevölkerungsrisiko.** Doch über die gesamte volljährige Bevölkerung gerechnet — nicht nur über jene, die den Mythos schon kennen — fällt die Präventionsbedeutung niedrig aus (Bevölkerungsrelevanz: 17 Punkte).

      Bevölkerungsrisiko ist nur für Voll- und Minderjährige belastbar; die anderen Gruppen sind zu klein für eine Hochrechnung.
    hint: ""
  - heading: |-
      Wo wir suchen.
      Wem wir vertrauen.
    bodyText: |-
      In einem eigenen Studienteil haben wir gefragt: Wo suchen Menschen aktiv nach Informationen zu Cannabis — und wem vertrauen sie dabei?

      Erwachsene gehen am häufigsten in die Apotheke oder Arztpraxis (60 %). Minderjährige nur zu 37 % — sie fragen lieber Angehörige (53 %). Foren und Influencer:innen spielen vor allem in jüngeren Zielgruppen eine Rolle.

      Beim Vertrauen liegen Apotheken über alle Gruppen vorn (92 von 100). Doch wer ihnen vertraut, sucht dort nicht zwangsläufig — die Lücke zwischen Vertrauen und tatsächlicher Informationssuche ist der eigentliche Befund.
    hint: ""
  - heading: |-
      Was uns nebenbei erreicht.
      Wo Aufklärung am meisten bewegt.
    bodyText: |-
      Andere Quellen erreichen uns ohne aktive Suche: Radio, Fernsehen, Plakate, Infoscreens. Diesen Quellen vertrauen Menschen weniger als der Apotheke — sie erreichen uns trotzdem.

      Wahrnehmung × Vertrauen ergibt das Präventionspotenzial: der größte Hebel liegt dort, wo Reichweite und Glaubwürdigkeit zusammenfallen, nicht dort, wo Information am häufigsten landet.
    hint: ""
  - heading: Was wir daraus gemacht haben.
    bodyText: |-
      Diese Website verwertet die Befunde der CaRM-Studie — für unterschiedliche Bedürfnisse:

      {icon:faktenkarten} 42 Faktenkarten mit wissenschaftlicher Klassifikation, Quellen und Erklärungen je Mythos.
      {icon:quiz} Ein Quiz, das dein Wissen mit den Ergebnissen der Bevölkerungsbefragung vergleicht.
      {icon:daten-explorer} Den Daten-Explorer mit Sichten für allgemeines Publikum, Eltern, Fachkräfte und Forschung.
      {icon:meine-interessen} Meine Interessen — die FAQ, sortiert nach Themen und Zielgruppen.
    hint: ""
  - heading: Wer hinter der Studie steht.
    bodyText: >-
      Durchgeführt vom Institut für interdisziplinäre Sucht- und Drogenforschung (ISD) in Hamburg. Gefördert vom Bundesinstitut für Öffentliche Gesundheit (BIÖG) im Auftrag des Bundesministeriums für Gesundheit.
    hint: ""
timelineTooltips:
  - anchorDate: "2024-04-01"
    body: >-
      Mit dem Konsumcannabisgesetz tritt eine neue Realität ein. Das ISD beginnt zu prüfen, was die Bevölkerung wirklich über Cannabis denkt.
  - anchorDate: "2024-09-01"
    body: >-
      1.041 Personen, 60 Präventionsfachkräfte, dazu eine Medienanalyse. 7.408 frei formulierte Aussagen werden gesammelt — der Rohstoff für die spätere Auswahl.
  - anchorDate: "2025-01-15"
    body: >-
      Jede These wird gegen 548 wissenschaftliche Quellen geprüft — PubMed, PsychInfo, SocIndex und Google Scholar. Daraus entsteht die vierstufige Einordnung.
  - anchorDate: "2025-07-15"
    body: >-
      Quantitative Erhebung mit 2.795 Personen: 2.097 Erwachsene, 555 Minderjährige, 143 Mitglieder von Anbauvereinigungen. Fünf Indikatoren je These.
  - anchorDate: "2025-11-15"
    body: >-
      Eine interdisziplinäre Expert:innenrunde bewertet Literatur und Befragung zusammen und legt die endgültige Klassifikation der 42 Thesen fest.
  - anchorDate: "2025-12-01"
    body: >-
      Veröffentlichung des Abschlussberichts und der interaktiven Website: 42 Faktenkarten, ein Selbsttest, ein Daten-Explorer und themenorientierte FAQ.
