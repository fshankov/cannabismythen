methodikPhases:
  - label: Phase 1
    title: Empirische Erfassung der Überzeugungen
    body: >-
      Drei Quellen liefen parallel: eine offene Online-Befragung von 1.041 Personen aus dem Payback-Panel (August bis Oktober 2024), Fragebögen von 60 Präventionsfachkräften aus mehreren Bundesländern und eine systematische Analyse einschlägiger (Online-)Medien.


      In Summe entstanden 7.408 frei formulierte Aussagen. Sie wurden zu 100 Themenfeldern verdichtet und auf 53 Themenfelder gebündelt — Grundlage für 42 prüfbare Thesen.
  - label: Phase 2
    title: Wissenschaftliche Literaturanalyse
    body: >-
      Jede der 42 Thesen wurde gegen 548 Quellen aus PubMed, Web of Science, dem Xchange-Präventionsregister und der EUDA geprüft. Die Recherche lief im Januar und Februar 2025.


      Daraus entstand die vierstufige Einordnung: richtig, eher richtig, eher falsch, falsch — plus „keine Aussage möglich", wenn die Evidenzlage keine eindeutige Einordnung erlaubt.
  - label: Phase 3
    title: Quantitative Bevölkerungsbefragung
    body: >-
      Im Sommer 2025 wurden 2.097 Erwachsene (18–70 Jahre) im Payback-Panel befragt, quotiert nach Konsumstatus. Hinzu kamen 555 Minderjährige (16–17 Jahre) über das Horizoom-Panel und 143 Mitglieder von Cannabis-Anbauvereinigungen — insgesamt 2.795 Personen.


      Für jede These wurden fünf Indikatoren erhoben: Kenntnis, Bedeutung, Richtigkeit, Präventionsbedeutung und Bevölkerungsrisiko. Zusätzlich wurden Informationsquellen und deren Vertrauenswürdigkeit untersucht.
  - label: "Expert:innenrunde"
    title: November 2025
    body: >-
      In einer interdisziplinären Expert:innendiskussion wurden Literaturanalyse und quantitative Erhebung zusammengeführt. Hier wurde die endgültige Klassifikation der 42 Thesen festgelegt.
