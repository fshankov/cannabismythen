pageTitle: Über das Projekt
pageDescription: >-
  Die CaRM-Studie — Cannabiskonsum: Risiken und Mythen. Forschungsprozess,
  Methodik und Team in einer interaktiven Geschichte.
steps:
  - heading: |-
      Hand aufs Herz:
      Wie viel von dem, was du über Cannabis weißt, stimmt eigentlich?
    bodyText: >-
      Im April 2024 wurde Cannabis in Deutschland teil-legalisiert. Das Konsumcannabisgesetz beendete eine jahrzehntelange Verbotskultur. Auf einmal stehen Fragen im Raum, die vorher selten gestellt wurden — und alle haben eine Meinung dazu.


      Das Institut für interdisziplinäre Sucht- und Drogenforschung Hamburg (ISD) wollte es genau wissen: Was glaubt die Bevölkerung wirklich über Cannabis — und wie viel davon stimmt?
    legend: "★ Projektzeitraum CaRM-Studie · April 2024 bis September 2026"
    hint: ""
  - heading: |-
      Jede:r in Deutschland
      hat eine Meinung über Cannabis.
    bodyText: >-
      Online, am Küchentisch, im Wartezimmer — Cannabis ist ein Thema. Das ISD sammelte Aussagen systematisch: eine Online-Befragung von 1.041 Personen, Gespräche mit 60 Präventionsfachkräften, eine Analyse einschlägiger (Online-)Medien.


      Manches klingt plausibel, manches widersprüchlich. Was davon stimmt eigentlich? Genau das wollten wir herausfinden.
    legend: "7.408 Aussagen · 53 Themenfelder · 42 prüfbare Thesen"
    hint: ""
  - heading: |-
      Aus tausenden Stimmen
      blieben 42 prüfbare Thesen.
    bodyText: >-
      Drei Quellen, gegeneinander abgeglichen: Online-Befragung, Fachgespräche, Medienanalyse. Was immer wieder auftauchte, haben wir gebündelt und zu **42 prüfbaren Thesen** verdichtet — thematisch sortiert.
    hint: ""
  - heading: |-
      Jede These wurde
      gegen die Forschungsliteratur geprüft.
    bodyText: >-
      Jede der 42 Thesen — abgeglichen mit der aktuellen wissenschaftlichen Evidenz. Vierstufige Skala von **falsch** bis **richtig**, plus „keine Aussage", wenn die Forschungslage uneindeutig bleibt.
    legend: >-
      548 wissenschaftliche Quellen — systematische Literaturrecherche in PubMed, PsychInfo, SocIndex, Google Scholar (Stand 09/2025).
    hint: ""
  - heading: |-
      Dann fragten wir 2.795 Menschen,
      was sie für richtig halten.
    bodyText: >-
      Bevölkerungsbefragung in Deutschland: 2.097 Erwachsene (18–70 Jahre), 555 Minderjährige (16–17 Jahre), 143 Mitglieder von Cannabis-Anbauvereinigungen.


      Für jede der 42 Thesen erhoben wir fünf Indikatoren — über fünf Zielgruppen hinweg: Volljährige, Minderjährige, Konsumierende, junge Erwachsene und Eltern minderjähriger Kinder.
    hint: ""
  - heading: |-
      Was sie wissen.
      Was sie glauben.
    bodyText: |-
      Für jede These haben wir drei Werte gemessen.

      **Kenntnis** — wer hat die Aussage schon einmal gehört? „Cannabis lindert Schmerzen" [↙ eher falsch] kennen 77 % der Konsumierenden, „Cannabis ist ein Allheilmittel" [↓ falsch] nur 12 % der Erwachsenen.

      **Bedeutung** — wie stark prägt die Aussage das eigene Verhalten? Was Menschen kennen, wiegt für sie meist auch schwerer; beide Werte laufen eng zusammen.

      **Richtigkeit** — wie nahe liegt die Einschätzung an der Wissenschaft? „Cannabis gefährdet die Verkehrssicherheit" [↑ richtig] erreicht bei Erwachsenen 92 von 100, „Cannabis verursacht Motivationsverlust" [↓ falsch] nur 25. Die Mehrheit liegt also daneben.
    hint: ""
  - heading: |-
      Wo Aufklärung
      am meisten bewegt.
    bodyText: |-
      Aus diesen drei Werten lassen sich zwei weitere ableiten.

      **Präventionsbedeutung** verbindet Bedeutung und Wissenslücke. Sie zeigt, wo Aufklärung am meisten bewegt: dort, wo ein falsches Bild das Verhalten prägt.

      **Bevölkerungsrisiko** wiegt zusätzlich die Reichweite mit ein — ein weit bekannter Halbmythos erreicht mehr Menschen als ein obskurer. Sinnvoll ist diese Kennzahl nur für Voll- und Minderjährige; die anderen Gruppen sind zu klein für eine belastbare Hochrechnung.
    hint: ""
  - heading: |-
      Wo wir suchen.
      Wem wir vertrauen.
    bodyText: |-
      Wo suchen Menschen aktiv nach Informationen zu Cannabis — und wem vertrauen sie dabei?

      Erwachsene gehen am häufigsten in die Apotheke oder Arztpraxis (60 %). Minderjährige greifen dort nur zu 37 % zu und fragen lieber Angehörige (53 %). Foren und Influencer:innen spielen vor allem in jüngeren Zielgruppen eine Rolle.

      Beim Vertrauen liegen Apotheken über alle Gruppen vorn (92 von 100). Doch wer vertraut, sucht nicht zwangsläufig dort — die Lücke zwischen Vertrauen und Nutzung ist der eigentliche Befund.
    hint: ""
  - heading: |-
      Was uns nebenbei erreicht.
      Wo Aufklärung am meisten bewegt.
    bodyText: |-
      Andere Quellen erreichen uns ohne aktive Suche: Radio, Fernsehen, Plakate, Infoscreens. Diesen Quellen vertrauen Menschen weniger als der Apotheke — sie erreichen uns trotzdem.

      Wahrnehmung × Vertrauen ergibt das Präventionspotenzial: der größte Hebel liegt dort, wo Reichweite und Glaubwürdigkeit zusammenfallen, nicht dort, wo Information am häufigsten landet.
    hint: ""
  - heading: Was wir daraus gemacht haben.
    bodyText: |-
      Diese Website verwertet die Befunde der CaRM-Studie für unterschiedliche Bedürfnisse:

      — 42 Faktenkarten mit wissenschaftlicher Klassifikation, Quellen und Erklärungen je Mythos.
      — Ein Quiz, das dein eigenes Wissen mit den Ergebnissen der Bevölkerungsbefragung vergleicht.
      — Den Daten-Explorer mit Sichten für allgemeines Publikum, Eltern, Fachkräfte und Forschung.
      — Meine Interessen — die FAQ, sortiert nach Themen und Zielgruppen.
    hint: ""
  - heading: Wer hinter der Studie steht.
    bodyText: >-
      Die CaRM-Studie — Cannabiskonsum: Risiken und Mythen. Durchgeführt vom Institut für interdisziplinäre Sucht- und Drogenforschung (ISD) in Hamburg. Gefördert vom Bundesinstitut für Öffentliche Gesundheit (BIöG).
    hint: ""
timelineTooltips:
  - anchorDate: "2024-04-01"
    body: >-
      Mit dem Konsumcannabisgesetz tritt eine neue Realität ein. Das ISD beginnt zu prüfen, was die Bevölkerung wirklich über Cannabis denkt.
  - anchorDate: "2024-09-01"
    body: >-
      1.041 Personen, 60 Präventionsfachkräfte, dazu eine Medienanalyse. 7.408 frei formulierte Aussagen werden gesammelt — der Rohstoff für die spätere Auswahl.
  - anchorDate: "2025-01-15"
    body: >-
      Jede These wird gegen 548 wissenschaftliche Quellen geprüft — PubMed, PsychInfo, SocIndex und Google Scholar. Daraus entsteht die vierstufige Einordnung.
  - anchorDate: "2025-07-15"
    body: >-
      Quantitative Erhebung mit 2.795 Personen: 2.097 Erwachsene, 555 Minderjährige, 143 Mitglieder von Anbauvereinigungen. Fünf Indikatoren je These.
  - anchorDate: "2025-11-15"
    body: >-
      Eine interdisziplinäre Expert:innenrunde bewertet Literatur und Befragung zusammen und legt die endgültige Klassifikation der 42 Thesen fest.
  - anchorDate: "2026-09-01"
    body: >-
      Veröffentlichung auf dieser Website: 42 Faktenkarten, ein Selbsttest, ein Daten-Explorer und themenorientierte FAQ.
