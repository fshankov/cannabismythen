pageTitle: Über das Projekt
pageDescription: >-
  Die CaRM-Studie — Cannabiskonsum: Risiken und Mythen. Forschungsprozess,
  Methodik und Team in einer interaktiven Geschichte.
steps:
  - heading: |-
      Hand aufs Herz:
      Wie viel von dem, was du über Cannabis weißt, stimmt eigentlich?
    bodyText: >-
      Im April 2024 wurde Cannabis in Deutschland teil-legalisiert. Das Konsumcannabisgesetz beendete eine jahrzehntelange Verbotskultur. Auf einmal stehen Fragen im Raum, die vorher selten gestellt wurden — und alle haben eine Meinung dazu.


      Das Institut für interdisziplinäre Sucht- und Drogenforschung Hamburg (ISD) wollte es genau wissen: Was glaubt die Bevölkerung wirklich über Cannabis — und wie viel davon stimmt?
    hint: ""
  - heading: |-
      Jede:r in Deutschland
      hat eine Meinung über Cannabis.
    bodyText: >-
      Online, am Küchentisch, im Wartezimmer — Cannabis ist ein Thema. Das ISD sammelte Aussagen systematisch: eine Online-Befragung von 1.041 Personen, Gespräche mit 60 Präventionsfachkräften, eine Analyse einschlägiger (Online-)Medien.


      Manches klingt plausibel, manches widersprüchlich. Was davon stimmt eigentlich? Genau das wollten wir herausfinden.
    hint: "Tippe auf eine Stimme, um sie zu lesen. ↓"
  - heading: |-
      Aus tausenden Stimmen
      blieben 42 prüfbare Thesen.
    bodyText: >-
      Drei Quellen, gegeneinander abgeglichen: Online-Befragung, Fachgespräche, Medienanalyse. Aussagen, die immer wieder auftauchten, wurden gebündelt und zu prüfbaren Thesen verdichtet. Dann thematisch sortiert: medizinisch, körperlich, psychisch, kombiniert, sozial, rechtlich.


      42 Thesen blieben übrig. Manche stimmen, manche nicht.
    hint: ""
  - heading: |-
      Jede These wurde
      gegen die Forschungsliteratur geprüft.
    bodyText: |-
      Jede der 42 Thesen geprüft — gegen die aktuelle wissenschaftliche Evidenz. Vierstufige Skala: richtig, eher richtig, eher falsch, falsch.

      ↑ 16 stimmen.
      ↗ 6 stimmen eher.
      ↙ 11 stimmen eher nicht.
      ↓ 7 stimmen nicht.
      — Bei 2 Thesen lässt die Forschungslage keine eindeutige Aussage zu.

      Grundlage: 548 wissenschaftliche Quellen aus PubMed, PsychInfo, SocIndex und Google Scholar (Stand: September 2025).
    hint: "Tippe auf eine Karte, um sie zu lesen. ↓"
  - heading: |-
      Dann fragten wir 2.795 Menschen,
      was sie für richtig halten.
    bodyText: >-
      Bevölkerungsbefragung in Deutschland: 2.097 Erwachsene (18–70 Jahre), 555 Minderjährige (16–17 Jahre), 143 Mitglieder von Cannabis-Anbauvereinigungen.


      Für jede der 42 Thesen erhoben wir fünf Indikatoren — über fünf Zielgruppen hinweg: Volljährige, Minderjährige, Konsumierende, junge Erwachsene und Eltern minderjähriger Kinder.
    hint: ""
  - heading: |-
      Was sie wissen.
      Was sie glauben.
    bodyText: |-
      **Kenntnis** — 77 % der Konsumierenden kennen „Cannabis lindert Schmerzen" [↙ eher falsch]. „Cannabis ist ein Allheilmittel" [↓ falsch] kennen dagegen nur 12 % der Erwachsenen.

      **Bedeutung** — was Menschen kennen, wiegt für sie meist auch schwerer. Beide Werte laufen eng zusammen.

      **Richtigkeit** — „Cannabis gefährdet die Verkehrssicherheit" [↑ richtig] kommt bei Erwachsenen auf 92 von 100, fast Konsens. „Cannabis verursacht Motivationsverlust" [↓ falsch] nur 25 — die Mehrheit liegt daneben.

      **Präventionsbedeutung** — wo prägt ein falsches Bild Verhalten? Genau dort lohnt sich Aufklärung am meisten.

      **Bevölkerungsrisiko** — ein verbreiteter Halbmythos erreicht mehr Köpfe als ein obskurer. Sinnvoll nur für Voll- und Minderjährige.
    hint: ""
  - heading: |-
      Wo wir suchen.
      Wem wir vertrauen.
    bodyText: |-
      **Suche** — Apotheken und Arztpraxen führen bei Erwachsenen (60 %). Minderjährige greifen dort nur zu 37 % zu und fragen lieber Angehörige (53 %). Foren und Influencer:innen sind vor allem für jüngere Gruppen relevant.

      **Vertrauen** — Apotheken erreichen 92 Punkte, in allen Zielgruppen. Doch wer dort vertraut, sucht nicht zwangsläufig dort. Die Lücke zwischen Vertrauen und Nutzung ist der eigentliche Befund.
    hint: ""
  - heading: |-
      Was uns nebenbei erreicht.
      Wo Aufklärung am meisten bewegt.
    bodyText: |-
      **Wahrnehmung** — Nicht aktiv gesuchten Informationen begegnen wir in Radio, Fernsehen, auf Plakaten und Infoscreens. Wir vertrauen ihnen weniger, sie erreichen uns trotzdem.

      **Prävention** — Wahrnehmung × Vertrauen ergibt das Präventionspotenzial. Die größten Hebel liegen dort, wo Reichweite und Vertrauen zusammenfallen — nicht dort, wo Information am häufigsten landet.
    hint: ""
  - heading: Was wir daraus gemacht haben.
    bodyText: |-
      Diese Website verwertet die Befunde der CaRM-Studie für unterschiedliche Bedürfnisse:

      — 42 Faktenkarten mit wissenschaftlicher Klassifikation, Quellen und Erklärungen je Mythos.
      — Ein Quiz, das dein eigenes Wissen mit den Ergebnissen der Bevölkerungsbefragung vergleicht.
      — Den Daten-Explorer mit Sichten für allgemeines Publikum, Eltern, Fachkräfte und Forschung.
      — Meine Interessen — die FAQ, sortiert nach Themen und Zielgruppen.
    hint: ""
  - heading: Wer hinter der Studie steht.
    bodyText: >-
      Die CaRM-Studie — Cannabiskonsum: Risiken und Mythen. Durchgeführt vom Institut für interdisziplinäre Sucht- und Drogenforschung (ISD) in Hamburg. Gefördert vom Bundesinstitut für Öffentliche Gesundheit (BIöG).
    hint: ""
