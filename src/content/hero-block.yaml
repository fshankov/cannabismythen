pairs:
  - belief: 'Cannabis verursacht Psychosen.'
    science: 'Stimmt. Besonders bei Jugendlichen und hochpotentem Cannabis erhöht der Konsum das Psychose-Risiko deutlich.'
    mythSlug: 'm24'
    verdict: 'richtig'

  - belief: 'Cannabis entspannt.'
    science: 'Im Grundsatz ja. Viele berichten von Stressabbau — die Wirkung hängt aber stark von Dosis, Sorte und persönlicher Verfassung ab.'
    mythSlug: 'm31'
    verdict: 'eher_richtig'

  - belief: 'Cannabis ist eine Einstiegsdroge.'
    science: 'Eher nein. Wenn überhaupt, sind Nikotin und Alkohol die ersten Substanzen — die Gateway-These hält der Forschung nicht stand.'
    mythSlug: 'm22'
    verdict: 'eher_falsch'

  - belief: 'Cannabis macht nicht abhängig.'
    science: 'Doch. Bei frühem Einstieg und häufigem Konsum steigt das Risiko einer Cannabisgebrauchsstörung deutlich.'
    mythSlug: 'm23'
    verdict: 'falsch'

  - belief: 'Cannabis hilft beim Abnehmen.'
    science: 'Unklar. Die Studienlage ist widersprüchlich — eine eindeutige Aussage lässt sich derzeit nicht treffen.'
    mythSlug: 'm17'
    verdict: 'keine_aussage'

