# AI-drafted native rewrite (2026-05-19, Round-5). Adds per-card
# additionalTargets — small pill-links under each primary CTA that
# deep-link into the audience's matching Meine-Interessen page,
# their own Daten-Explorer dashboard, a relevant quiz module or
# factsheet area. Eltern/Jugendliche/Konsumierende/Lehrkräfte
# primaries unchanged; Fachkräfte keeps /daten-explorer/ as primary
# with Praxis-Fragen + Informationskanäle as additionals.
# Awaiting ISD editorial review before merge to main.

eyebrow: 'Schon eine Idee?'
headline: 'Dein Einstieg'
lede: "Du weißt schon, was du brauchst? Hier geht's direkt los."
cards:
  - audienceId: 'jugendliche'
    recommendation: 'Direkt zum Quiz.'
    targetUrl: '/quiz/'
    additionalTargets:
      - label: 'Deine Fragen'
        url: '/meine-interessen/jugendliche/'
      - label: 'Daten zu Minderjährigen'
        url: '/daten-explorer/indikatoren-minderjaehrige/'
  - audienceId: 'eltern'
    recommendation: 'Fakten für den Familienalltag'
    targetUrl: '/meine-interessen/eltern/'
    additionalTargets:
      - label: 'Daten zur eigenen Zielgruppe'
        url: '/daten-explorer/indikatoren-eltern/'
      - label: 'Was Minderjährige wissen'
        url: '/daten-explorer/indikatoren-minderjaehrige/'
  - audienceId: 'lehrkraefte'
    recommendation: 'Material und Hintergrund für den Unterricht'
    targetUrl: '/meine-interessen/lehrkraefte/'
    additionalTargets:
      - label: 'Schulungsmaterial: 42 Karten'
        url: '/fakten-karten/'
      - label: 'Daten zu Schüler:innen'
        url: '/daten-explorer/indikatoren-minderjaehrige/'
  - audienceId: 'konsumierende'
    recommendation: 'Was die Forschung zeigt.'
    targetUrl: '/meine-interessen/konsumierende/'
    additionalTargets:
      - label: 'Daten zu Konsumierenden'
        url: '/daten-explorer/indikatoren-konsumierende/'
      - label: 'Quiz: Risiken Körper & Psyche'
        url: '/quiz/quiz-risiken-koerper-psyche/'
  - audienceId: 'fachkraefte'
    recommendation: 'Daten und Indikatoren erkunden'
    targetUrl: '/daten-explorer/'
    additionalTargets:
      - label: 'Praxis-Fragen'
        url: '/meine-interessen/fachkraefte/'
      - label: 'Informationskanäle'
        url: '/daten-explorer/informationskanaele/'
