# Quiz-overhaul Stage A (2026-05-16) — single canonical population
# sentence for the per-band fallback. All four bands now use the same
# wording; banded differentiation lives in the verdict block
# (Keystatic verdicts.{band}.title/body).
#
# Note: as of Stage A the result hero in ResultScreen.tsx composes the
# population line directly from computePopulationStats(); this YAML is
# kept in sync so Keystatic editors don't see drift between surfaces.
# Future stages can re-introduce banded copy by switching ResultScreen
# back to bandedPopulationLine().
#
# Placeholders (interpolated by ResultScreen.tsx if/when it falls back
# to this template):
#   {x}    → population's average absolute points for THIS module (int)
#   {z}    → number of myths in THIS module (int)
#   {pct}  → population's average percentage for THIS module (int, 0–100)
#
# All values are rounded to the nearest integer (BugHerd #31, no decimals).
# Source data: each myth's populationCorrectPct (CaRM mean distanceScore).
#
# AI draft, awaiting ISD review.
