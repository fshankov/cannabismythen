<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Cannabis Mythen">
  <defs>
    <!-- dark app tile so the light, glassy Lupe reads on any browser tab -->
    <linearGradient id="fvTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22573f"/>
      <stop offset="1" stop-color="#0c241a"/>
    </linearGradient>
    <!-- baked frosted-glass fill (stands in for the live backdrop-filter) -->
    <radialGradient id="fvFrost" cx="0.42" cy="0.36" r="0.72">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".36"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </radialGradient>
    <radialGradient id="fvSpec" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff" stop-opacity=".6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fvDepth" cx="0.5" cy="0.62" r="0.62">
      <stop offset=".5" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#06120c" stop-opacity=".38"/>
    </radialGradient>
    <linearGradient id="fvRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".6"/><stop offset=".5" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="fvLens"><circle cx="30" cy="30" r="14.6"/></clipPath>
    <filter id="fvBB" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.1"/></filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#fvTile)"/>

  <g clip-path="url(#fvLens)">
    <circle cx="30" cy="30" r="14.6" fill="url(#fvFrost)"/>
    <circle cx="30" cy="30" r="14.6" fill="url(#fvDepth)"/>
    <!-- soft refracted echo of the mark -->
    <g filter="url(#fvBB)" opacity=".5" transform="translate(30 26.5) scale(1.12) translate(-12 -9)" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 16h20" stroke="#dfe5e1"/><path d="M12 2v14" stroke="#c2cac6"/><path d="m5 9 7 7 7-7" stroke="#c2cac6"/>
    </g>
    <!-- crisp mark: grey, baseline lighter -->
    <g transform="translate(30 26.5) scale(.86) translate(-12 -9)" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 16h20" stroke="#e6ebe7"/><path d="M12 2v14" stroke="#cfd6d1"/><path d="m5 9 7 7 7-7" stroke="#cfd6d1"/>
    </g>
    <ellipse cx="24.5" cy="23" rx="9" ry="5.5" transform="rotate(-32 24.5 23)" fill="url(#fvSpec)"/>
    <path d="M19.5 24 A14.6 14.6 0 0 1 40 19" fill="none" stroke="url(#fvRim)" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke="#e2e2db" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="30" cy="30" r="16"/><path d="M50 50 41.3 41.3"/>
  </g>
</svg>
